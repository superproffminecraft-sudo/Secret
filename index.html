<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: white; font-family: Arial, sans-serif; overflow: hidden; }

/* ========================= */
/*         COUNTDOWN         */
/* ========================= */
#countdown-screen {
    display: none; 
    position:fixed; top:0; left:0; width:100vw; height:100vh;
    background:black; justify-content:center; align-items:center;
    z-index:1000; transition:opacity 0.8s ease;
}
#particles-canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; cursor:crosshair; }
#number {
    font-size:calc(1.5rem + 3vw); color:#ff007f; position:relative; z-index:1;
    text-shadow:0 0 20px #ff007f,0 0 40px #ff007f; text-align:center;
    width:90%; font-family:'Courier New',monospace; font-weight:bold; letter-spacing:2px;
    visibility: hidden;
}

/* ========================= */
/* MAIN CONTENT              */
/* ========================= */
#main-content {
    display:none; flex-direction:column; align-items:center; justify-content:center;
    height:100vh;
    background: transparent !important;
    position: relative;
    z-index: 10;
}
.msg {
    font-size:2rem; color:#ff007f; margin-bottom:30px;
    font-family:'Courier New',monospace; animation:pulso 2s ease-in-out infinite;
}
.card-stack { position:relative; width:min(280px, 80vw); height:380px; }
.photo-card {
    position:absolute; width:100%; height:340px; background:white;
    padding:12px; padding-bottom:50px; box-shadow:0 10px 30px rgba(255,0,127,0.3);
    border-radius:6px; cursor:pointer;
    transition:transform 0.6s cubic-bezier(0.23,1,0.32,1),opacity 0.6s;
}
.photo-card img, 
.photo-card video { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    border-radius: 10px; 
}
.photo-card p {
    color:#333; text-align:center; font-weight:bold; font-size:0.9rem;
    position:absolute; bottom:10px; left:0; right:0;
}
.tap-hint { color:rgba(255,255,255,0.5); font-size:0.8rem; margin-top:15px; animation:parpadeo 1.5s ease-in-out infinite; }

/* ========================= */
/* WARP                      */
/* ========================= */
#warp-screen {
    display:none; position:fixed; top:0; left:0; width:100vw; height:100vh;
    background:#000; z-index:2000; justify-content:center; align-items:center;
}
#warp-canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
#warp-text {
    position:relative; z-index:2; color:#ffb3d9;
    font-family:'Courier New',monospace; font-size:1.1rem; letter-spacing:4px;
    text-shadow:0 0 15px #ff007f; opacity:0; transition:opacity 1.2s ease;
    text-align:center; pointer-events:none;
}

/* ========================= */
/* SOLAR SCREEN              */
/* ========================= */
#solar-screen {
    position:fixed; top:0; left:0; width:100vw; height:100vh;
    background:radial-gradient(ellipse at 50% 55%, #080010 0%, #000 100%);
    z-index:500; overflow:hidden; display:none;
    justify-content:center; align-items:center;
}
#bg-stars { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
#solar-title {
    position:absolute; top:24px; width:100%; text-align:center;
    color:#ff007f; font-size:1rem; font-family:'Courier New',monospace;
    text-shadow:0 0 12px #ff007f; z-index:10;
    animation:pulso 2s ease-in-out infinite; pointer-events:none;
}
#drag-hint {
    position: absolute;
    bottom: 150px; 
    
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-size: 0.75rem;
    letter-spacing: 1px;
    animation: parpadeo 2s ease-in-out infinite;
    pointer-events: none;
    z-index: 10;
}
#scene-wrapper {
    width:min(400px, 95vw); height:min(400px, 95vw); cursor:grab; user-select:none;
    position:relative; z-index:5; perspective:1000px;
}
#scene-wrapper:active { cursor:grabbing; }
#solar-scene {
    width:100%; height:100%;
    transform-style:preserve-3d;
    transform:rotateX(22deg) rotateY(0deg);
    position:relative;
}

/* ========================= */
/* SOL Y PLANETAS            */
/* ========================= */
.sun {
    position:absolute; top:50%; left:50%;
    width:84px; height:84px; border-radius:50%;
    transform:translate(-50%,-50%); z-index:10;
    background: radial-gradient(circle at 38% 35%, #fffde7 0%, #ffeb3b 28%, #ff8f00 62%, #bf360c 100%);
    box-shadow: inset -14px -14px 28px rgba(0,0,0,0.42), inset 7px 7px 14px rgba(255,255,255,0.22), 0 0 55px #ffeb3b, 0 0 95px rgba(255,143,0,0.55), 0 0 140px rgba(255,80,0,0.20);
    animation: sun-pulse 3s ease-in-out infinite;
    will-change: transform;
}
@keyframes sun-pulse {
    0%,100% { box-shadow: inset -14px -14px 28px rgba(0,0,0,0.42), inset 7px 7px 14px rgba(255,255,255,0.22), 0 0 55px #ffeb3b, 0 0 95px rgba(255,143,0,0.55); }
    50%      { box-shadow: inset -14px -14px 28px rgba(0,0,0,0.42), inset 7px 7px 14px rgba(255,255,255,0.22), 0 0 75px #ffeb3b, 0 0 130px rgba(255,143,0,0.75), 0 0 180px rgba(255,80,0,0.30); }
}
.orbit-tilt { position:absolute; top:50%; left:50%; transform-style:preserve-3d; }
.orbit-ring {
    position:absolute; top:50%; left:50%; border-radius:50%;
    border:1px solid rgba(255,100,180,0.18); transform-style:preserve-3d;
    pointer-events: none;
    will-change: transform;
}
.planet3d {
    position:absolute; top:0; left:50%; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.45) 0%, rgba(255,0,127,0.12) 45%, rgba(0,0,0,0.22) 100%);
    box-shadow: 0 0 20px rgba(255,0,127,0.85), 0 0 6px rgba(255,0,127,0.50), inset 0 0 12px rgba(255,255,255,0.22);
    border:1px solid rgba(255,255,255,0.28); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    text-align:center; will-change: transform;
}
.pemoji { font-size:1.25rem; line-height:1; }
.ptxt   { font-size:0.5rem; color:#ffb3d9; font-weight:bold; text-align:center; margin-top:2px; line-height:1.2; }

/* ========================= */
/* CORAZONES Y BOTÓN         */
/* ========================= */
.fheart { position:absolute; color:#ff007f; opacity:0; pointer-events:none; animation:floatH linear infinite; }
@keyframes floatH {
    0%   { opacity:0; transform:translateY(0) scale(0.6); }
    20%  { opacity:1; }
    80%  { opacity:0.4; }
    100% { opacity:0; transform:translateY(-85px) scale(1.3); }
}
#solar-btn {
    position: absolute;
    bottom: 80px; 
    
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    border: 1.5px solid #ff007f;
    color: #ff007f;
    padding: 10px 32px;
    border-radius: 30px;
    font-size: 0.9rem;
    cursor: pointer;
    z-index: 10;
    font-family: 'Courier New',monospace;
    letter-spacing: 1px;
    animation: parpadeo 1.8s ease-in-out infinite;
}

/* ========================= */
/* SOBRE                     */
/* ========================= */
#envelope-container { display:none; flex-direction:column; align-items:center; justify-content:center; animation:aparecer 0.8s ease; }
@keyframes aparecer { from{opacity:0;transform:scale(0.8);} to{opacity:1;transform:scale(1);} }
.envelope-wrapper { position:relative; width:min(280px, 90vw); height:190px; cursor:pointer; }
.envelope {
    position:absolute; bottom:0; left:0; width:100%; height:190px;
    background:#ff4081; border-radius:0 0 12px 12px; z-index:2; overflow:hidden;
}
.env-left  { position:absolute; bottom:0; left:0;  width:0; height:0; border-left:min(140px, 45vw) solid #e0185f; border-top:95px solid transparent; }
.env-right { position:absolute; bottom:0; right:0; width:0; height:0; border-right:min(140px, 45vw) solid #e0185f; border-top:95px solid transparent; }
.flap {
    position:absolute; top:0; left:0; width:0; height:0;
    border-left:min(140px, 45vw) solid transparent; border-right:min(140px, 45vw) solid transparent;
    border-top:95px solid #c2185b; transform-origin:top center;
    transition:transform 0.55s ease; z-index:3;
}
.envelope-wrapper.open .flap    { transform:rotateX(180deg); }
.envelope-wrapper.open .envelope{ overflow:visible; }
.tap-instruction { margin-top:20px; color:rgba(255,255,255,0.6); font-size:0.85rem; animation:parpadeo 1.5s ease-in-out infinite; }

/* ========================= */
/* GLOBALES                  */
/* ========================= */
@keyframes pulso    { 0%,100%{text-shadow:0 0 15px #ff007f;} 50%{text-shadow:0 0 30px #ff007f,0 0 60px #ff007f;} }
@keyframes parpadeo { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
</style>

<script>
"use strict";

/* ============================================================
   EFECTO MATRIX + PARTICULAS DE TEXTO INTERACTIVAS (ROSA)
   ============================================================ */
const pCanvas = document.getElementById('particles-canvas');
const pctx    = pCanvas.getContext('2d');
let matrixColumns = [];
let textParticles = [];
let pAnimId;
let mousePart = { x: -1000, y: -1000 };
let currentPhase = 'loading';
let isFinalPhase = false;

class TextParticle {
    constructor(x, y, targetX, targetY, isPink = true) { // Cambiado a true por defecto
        this.x = x;
        this.y = y;
        this.targetX = targetX;
        this.targetY = targetY;
        this.baseX = targetX;
        this.baseY = targetY;
        this.vx = 0;
        this.vy = 0;
        this.size = 1.5;
        this.color = '#FF007F'; // Forzado a rosa
    }
    
    update() {
        const dx = mousePart.x - this.x;
        const dy = mousePart.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const forceRadius = 120;
        
        if (dist < forceRadius) {
            const force = (forceRadius - dist) / forceRadius;
            const angle = Math.atan2(dy, dx);
            this.vx -= Math.cos(angle) * force * 8;
            this.vy -= Math.sin(angle) * force * 8;
        }
        
        const returnForce = 0.08;
        this.vx += (this.targetX - this.x) * returnForce;
        this.vy += (this.targetY - this.y) * returnForce;
        
        this.vx *= 0.85;
        this.vy *= 0.85;
        
        this.x += this.vx;
        this.y += this.vy;
    }
    
    draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    pCanvas.width  = window.innerWidth;
    pCanvas.height = window.innerHeight;
    
    const fontSize = 16;
    const columns = Math.floor(pCanvas.width / fontSize);
    matrixColumns = Array(columns).fill(0).map(() => ({
        y: Math.random() * pCanvas.height,
        speed: 2 + Math.random() * 3,
        chars: []
    }));
    
    textParticles = [];
}

function createTextParticles(text, isPink = true) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    const fontSize = window.innerWidth < 600 ? 40 : 60;
    const lineHeight = fontSize * 1.1;
    const lines = text.split('\n');
    
    tempCtx.font = `bold ${fontSize}px monospace`;
    let maxWidth = 0;
    lines.forEach(line => {
        const w = tempCtx.measureText(line).width;
        if (w > maxWidth) maxWidth = w;
    });

    const textWidth = maxWidth;
    const textHeight = lines.length * lineHeight;
    
    tempCanvas.width = textWidth + 20;
    tempCanvas.height = textHeight + 20;
    
    tempCtx.font = `bold ${fontSize}px monospace`;
    tempCtx.fillStyle = 'white';
    tempCtx.textBaseline = 'top';
    lines.forEach((line, i) => {
        const w = tempCtx.measureText(line).width;
        const xOffset = 10 + (maxWidth - w) / 2;
        tempCtx.fillText(line, xOffset, 10 + i * lineHeight);
    });
    
    const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
    const newParticles = [];
    
    const centerX = pCanvas.width / 2;
    const centerY = pCanvas.height / 2;
    const startX = centerX - textWidth / 2;
    const startY = centerY - textHeight / 2;
    
    const gap = 2;
    for (let y = 0; y < imageData.height; y += gap) {
        for (let x = 0; x < imageData.width; x += gap) {
            const index = (y * imageData.width + x) * 4;
            const alpha = imageData.data[index + 3];
            
            if (alpha > 128) {
                const px = startX + x;
                const py = startY + y;
                const particle = new TextParticle(
                    px + (Math.random() - 0.5) * 100,
                    py + (Math.random() - 0.5) * 100,
                    px,
                    py,
                    isPink
                );
                newParticles.push(particle);
            }
        }
    }
    
    return newParticles;
}

function drawParticles() {
    pctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    pctx.fillRect(0, 0, pCanvas.width, pCanvas.height);
    
    const fontSize = 16;
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()'.split('');
    
    matrixColumns.forEach((col, i) => {
        const char = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        
        // Color principal: Rosa neón
        pctx.fillStyle = '#FF007F'; 
        pctx.font = `${fontSize}px monospace`;
        pctx.fillText(char, x, col.y);
        
        // Estela de la lluvia digital en tonos rosados
        for (let j = 1; j < 20; j++) {
            const opacity = Math.max(0, 1 - j * 0.08);
            // Calculamos un degradado de rosa (255, 0, 127)
            pctx.fillStyle = `rgba(255, ${Math.floor(50 * (1-opacity))}, ${127 + Math.floor(128 * opacity)}, ${opacity})`;
            pctx.fillText(
                chars[Math.floor(Math.random() * chars.length)], 
                x, 
                col.y - j * fontSize
            );
        }
        
        col.y += col.speed;
        if (col.y > pCanvas.height && Math.random() > 0.975) {
            col.y = 0;
        }
    });
    
    textParticles.forEach(p => {
        p.update();
        p.draw(pctx);
    });
    
    pAnimId = requestAnimationFrame(drawParticles);
}

// Event listeners de mouse permanecen igual...
pCanvas.addEventListener('mousemove', (e) => {
    const rect = pCanvas.getBoundingClientRect();
    mousePart.x = e.clientX - rect.left;
    mousePart.y = e.clientY - rect.top;
});

pCanvas.addEventListener('mouseleave', () => {
    mousePart.x = -1000;
    mousePart.y = -1000;
});

pCanvas.addEventListener('touchmove', (e) => {
    const rect = pCanvas.getBoundingClientRect();
    mousePart.x = e.touches[0].clientX - rect.left;
    mousePart.y = e.touches[0].clientY - rect.top;
}, { passive: true });

pCanvas.addEventListener('touchend', () => {
    mousePart.x = -1000;
    mousePart.y = -1000;
});

/* ============================================================
   WARP REUTILIZABLE
   ============================================================ */
function playWarp(wText, callback) {
    const ws = document.getElementById('warp-screen');
    const wt = document.getElementById('warp-text');
    const wc = document.getElementById('warp-canvas');

    ws.style.display = 'flex';
    ws.style.opacity = '1';
    
    // Ocultamos el texto estático para usar el efecto de partículas
    wt.style.display = 'none';

    wc.width  = window.innerWidth;
    wc.height = window.innerHeight;
    const wctx = wc.getContext('2d');

    // Inicializamos las partículas de texto para esta transición
    if (wText) {
        textParticles = createTextParticles(wText, true);
    }

    // Habilitamos la interacción del mouse/toque en la pantalla de Zoom
    const updateMouse = (e) => {
        const rect = wc.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        mousePart.x = clientX - rect.left;
        mousePart.y = clientY - rect.top;
    };
    wc.onmousemove = updateMouse;
    wc.ontouchmove = updateMouse;
    wc.onmouseleave = wc.ontouchend = () => {
        mousePart.x = -1000;
        mousePart.y = -1000;
    };

    const cx = wc.width / 2, cy = wc.height / 2;

    const stars = Array.from({ length: 350 }, () => ({
        x: (Math.random() - 0.5) * wc.width,
        y: (Math.random() - 0.5) * wc.height,
        z: Math.random() * wc.width,
        pz: wc.width
    }));

    let fr = 0, sp = 3;

    function animW() {
        wctx.fillStyle = 'rgba(0,0,0,0.2)';
        wctx.fillRect(0, 0, wc.width, wc.height);
        sp = 3 + (fr / 120) * 50;

        stars.forEach(s => {
            s.pz = s.z; s.z -= sp;
            if (s.z <= 0) {
                s.x = (Math.random() - 0.5) * wc.width;
                s.y = (Math.random() - 0.5) * wc.height;
                s.z = wc.width; s.pz = s.z;
            }
            const sx = (s.x / s.z)  * wc.width  + cx;
            const sy = (s.y / s.z)  * wc.height + cy;
            const px = (s.x / s.pz) * wc.width  + cx;
            const py = (s.y / s.pz) * wc.height + cy;

            const intensity = 1 - (s.z / wc.width);
            wctx.strokeStyle = `rgba(255, ${Math.floor(intensity * 50)}, ${127 + Math.floor(intensity * 128)}, ${intensity + 0.2})`;
            wctx.lineWidth   = Math.max(0.5, intensity * 3.5);

            wctx.beginPath(); 
            wctx.moveTo(px, py); 
            wctx.lineTo(sx, sy); 
            wctx.stroke();
        });

        // Dibujamos las partículas de texto interactivas sobre las estrellas
        textParticles.forEach(p => {
            p.update();
            p.draw(wctx);
        });

        fr++;
        if (fr < 140) {
            requestAnimationFrame(animW);
        } else {
            ws.style.transition = 'opacity 0.9s ease';
            ws.style.opacity    = '0';
            setTimeout(() => {
                ws.style.display = 'none';
                ws.style.opacity = '1';
                if(callback) callback();
            }, 900);
        }
    }
    requestAnimationFrame(animW);
}

/* ============================================================
   LÓGICA DEL CONTADOR ACTUALIZADA CON SECUENCIA DE TEXTO
   ============================================================ */
let countdownTimer;

function startCountdownLogic() {
    const cscrn = document.getElementById('countdown-screen');
    
    cscrn.style.display = 'flex';
    cscrn.style.opacity = '1';

    initParticles();
    drawParticles();

    const cumple = new Date("April 13, 2026 03:27:00").getTime();
    
    currentPhase = 'countdown';
    
    countdownTimer = setInterval(() => {
        const d = cumple - Date.now();
        if (d > 0 && currentPhase === 'countdown') {
            const dd = Math.floor(d / 86400000),
                  hh = Math.floor((d % 86400000) / 3600000),
                  mm = Math.floor((d % 3600000) / 60000),
                  ss = Math.floor((d % 60000) / 1000);
            const newText = `${dd}d ${hh}h ${mm}m ${ss}s`;
            textParticles = createTextParticles(newText, true);
        } else if (currentPhase === 'countdown') {
            clearInterval(countdownTimer);
            
            // Dibujamos las estrellas de fondo
            inicializarEstrellas();
            
            const numEl = document.getElementById('number');
            numEl.style.visibility = 'visible';

            currentPhase = 'final';
            isFinalPhase = true;
            
            // 2. Definimos la lista de mensajes que quieres mostrar
            const mensajesFinales = [
                "¡El momento\nllegó!",
                "Tengo algo\npara ti...",
                "Espero que\nte guste",
                "Te quiero\nmucho ❤️",
                
            ];

            let index = 0;

            // 3. Función para ir cambiando los mensajes uno por uno
            const mostrarSiguienteMensaje = () => {
                if (index < mensajesFinales.length) {
                    // Actualizamos las partículas con el nuevo texto
                    textParticles = createTextParticles(mensajesFinales[index], true);
                    index++;
                    // Esperamos 2.5 segundos entre cada frase
                    setTimeout(mostrarSiguienteMensaje, 2500);
                } else {
                    // 4. Cuando se acaban los mensajes, hacemos la transición final
                    cscrn.style.opacity = '0';
                    setTimeout(() => {
                        cancelAnimationFrame(pAnimId);
                        cscrn.style.display = 'none';
                        // Añadimos el efecto de zoom/partículas antes de mostrar las fotos
                        playWarp("Nuestros\nmomentos", () => {
                            document.getElementById('main-content').style.display = 'flex';
                        });
                    }, 800);
                }
            };

            // Iniciamos la secuencia
            mostrarSiguienteMensaje();
        }
    }, 1000);
}

window.onload = () => {
    playWarp("", startCountdownLogic);
};


/* ============================================================
   FOTOS (SWIPE STACK)
   ============================================================ */
let vistas = 0;
const cards = [...document.querySelectorAll('.photo-card')];
cards.forEach((c, i) => {
    // Efecto de "fotos acumuladas": mayor rotación y pequeño desfase aleatorio en X e Y
    const rot = (Math.random() * 24 - 12).toFixed(1); 
    const tx = (Math.random() * 20 - 10).toFixed(1);
    const ty = (Math.random() * 20 - 10).toFixed(1);
    
    c.style.zIndex    = cards.length - i;
    c.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;

    c.addEventListener('click', () => {
        // Al hacer clic, la foto sale disparada hacia arriba con una rotación extra
        c.style.transform = 'translateY(-160vh) rotate(30deg)';
        c.style.opacity   = '0';
        vistas++;
        if (vistas === cards.length)
            setTimeout(() => {
                document.getElementById('main-content').style.display = 'none';
                playWarp("viajandoa\nhacia ti...", mostrarSolar);
            }, 700);
    });
});

/* ============================================================
   SISTEMA SOLAR Y DRAG 3D
   ============================================================ */
const sunEl   = document.querySelector('.sun');
const orbitData = [...document.querySelectorAll('.orbit-tilt')].map(tilt => {
    const ring   = tilt.querySelector('.orbit-ring');
    const planet = tilt.querySelector('.planet3d');
    // Generamos parámetros aleatorios para que cada órbita sea única
    const tiltX = Math.random() * 40 + 30; // Entre 30 y 70 grados
    const tiltZ = Math.random() * 360;     // Rotación inicial aleatoria
    return {
        ring, planet,
        tiltX, tiltZ,
        duration: Math.random() * 10 + 10,  // Entre 10 y 20 segundos
        dir:      Math.random() > 0.5 ? 1 : -1,
        delay:    Math.random() * -20,     // Iniciar en un punto aleatorio
    };
});

orbitData.forEach(({ ring, planet, tiltX, tiltZ }) => {
    ring.style.animation   = 'none';
    planet.style.animation = 'none';
    // Aplicamos la inclinación aleatoria al contenedor de la órbita
    ring.parentElement.style.transform = `translate(-50%,-50%) rotateX(${tiltX}deg) rotateZ(${tiltZ}deg)`;
});

// Ajustar zoom inicial para móviles
const isMobile = window.innerWidth < 600;
let rotX = 22, rotY = 0, isDragging = false, lastX = 0, lastY = 0, currentZoom = isMobile ? 0.75 : 1.0;
const sceneWrapper = document.getElementById('scene-wrapper');
const solarScene   = document.getElementById('solar-scene');

function applySceneRotation() {
    // Usamos translateZ en lugar de scale para el zoom.
    // Esto mueve la cámara y evita la deformación de las esferas (billboarding).
    const zDepth = (currentZoom - 1) * 450;
    solarScene.style.transform = `translateZ(${zDepth}px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}
applySceneRotation();

// Control de Zoom con la rueda del ratón
sceneWrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    const newZoom = currentZoom + delta;
    if (newZoom >= 0.4 && newZoom <= 2.2) { // Límites seguros para no "atravesar" la cámara
        currentZoom = parseFloat(newZoom.toFixed(2));
        applySceneRotation();
    }
}, { passive: false });

sceneWrapper.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - lastX) * 0.55;
    rotX -= (e.clientY - lastY) * 0.55;
    rotX  = Math.max(-80, Math.min(80, rotX));
    lastX = e.clientX; lastY = e.clientY;
    applySceneRotation();
});
window.addEventListener('mouseup', () => isDragging = false);

sceneWrapper.addEventListener('touchstart', e => {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotY += (e.touches[0].clientX - lastX) * 0.55;
    rotX -= (e.touches[0].clientY - lastY) * 0.55;
    rotX  = Math.max(-80, Math.min(80, rotX));
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    applySceneRotation();
}, { passive: true });
window.addEventListener('touchend', () => isDragging = false);

let solarRafId  = null;
let solarStart  = 0;

function startSolarTick() {
    solarStart = performance.now();
    function tick() {
        const elapsed = (performance.now() - solarStart) / 1000;
        orbitData.forEach(({ ring, planet, tiltX, tiltZ, duration, dir, delay }) => {
            const angle = ((elapsed - delay) / duration * 360 * dir) % 360;
            ring.style.transform = `translate(-50%,-50%) rotateZ(${angle}deg)`;
            planet.style.transform =
                `translate(-50%,-50%)` +
                ` rotateZ(${-angle - tiltZ}deg)` + 
                ` rotateX(${-tiltX}deg)`         + 
                ` rotateY(${-rotY}deg)`          + 
                ` rotateX(${-rotX}deg)`;           
        });
        sunEl.style.transform = `translate(-50%,-50%) rotateY(${-rotY}deg) rotateX(${-rotX}deg)`;
        solarRafId = requestAnimationFrame(tick);
    }
    solarRafId = requestAnimationFrame(tick);
}

function stopSolarTick() {
    if (solarRafId !== null) {
        cancelAnimationFrame(solarRafId);
        solarRafId = null;
    }
}

function mostrarSolar() {
    const ss = document.getElementById('solar-screen');
    ss.style.display = 'flex';

    const ems = ['♥','❤','💕','✦','★','♡','💗'];
    for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className  = 'fheart';
        el.textContent = ems[Math.floor(Math.random() * ems.length)];
        el.style.left   = (5  + Math.random() * 90) + '%';
        el.style.top    = (10 + Math.random() * 75) + '%';
        el.style.fontSize       = (0.7 + Math.random() * 1)   + 'rem';
        el.style.animationDuration = (3   + Math.random() * 5)   + 's';
        el.style.animationDelay    = (Math.random() * 5)          + 's';
        ss.appendChild(el);
    }
    startSolarTick();
}

/* ============================================================
   BOTÓN CONTINUAR → SOBRE
   ============================================================ */
document.getElementById('solar-btn').addEventListener('click', () => {
    stopSolarTick(); 
    const ss = document.getElementById('solar-screen');
    ss.style.transition = 'opacity 0.8s ease';
    ss.style.opacity    = '0';
    setTimeout(() => {
        ss.style.display = 'none';
        ss.style.opacity = '1';
        const mainContent = document.getElementById('main-content');
        mainContent.style.display = 'flex';
        document.getElementById('card-stack').style.display    = 'none';
        document.getElementById('tap-hint').style.display      = 'none';
        document.getElementById('main-msg').textContent        = '💌 Para ti...';
        document.getElementById('envelope-container').style.display = 'flex';
    }, 800);
});

/* ============================================================
   INICIALIZAR ESTRELLAS
   ============================================================ */
function inicializarEstrellas() {
    const bgc = document.getElementById('bg-stars');
    bgc.width = window.innerWidth;
    bgc.height = window.innerHeight;
    const bctx = bgc.getContext('2d');
    
    // Limpiamos por si acaso
    bctx.clearRect(0, 0, bgc.width, bgc.height);

    for (let i = 0; i < 400; i++) { // Unas 400 estrellas para que se vea lleno
        const x = Math.random() * bgc.width,
              y = Math.random() * bgc.height,
              r = Math.random() * 1.5,
              l = Math.random();
        bctx.beginPath(); bctx.arc(x, y, r, 0, Math.PI * 2);
        
        // Usamos el rosa que te gusta y blanco
        bctx.fillStyle = l > 0.5 
            ? `rgba(255, 0, 127, ${0.3 + l * 0.5})` 
            : `rgba(255, 255, 255, ${0.2 + l * 0.5})`;
        bctx.fill();
    }
}

/* ============================================================
   SOBRE
   ============================================================ */
document.getElementById('envelope-wrapper').addEventListener('click', function () {
    const wasOpened = this.classList.contains('open');
    this.classList.toggle('open');
    
    const instruction = document.getElementById('tap-instruction');
    
    if (!wasOpened) {
        instruction.textContent = 'Toca para cerrar 💌';
        // Esperamos a que la animación de apertura progrese (1 segundo)
        setTimeout(() => {
            const confirmar = confirm("¿Quieres descargar una versión en PDF de esta carta para ti? ✨");
            if (confirmar) {
                const link = document.createElement('a');
                link.href = 'carta.pdf'; // Asegúrate de que el archivo exista en la carpeta
                link.download = 'Carta_Especial.pdf';
                link.click();
            }
        }, 1000);
    } else {
        instruction.textContent = 'Toca el sobre para abrirlo 💌';
    }
});

/* ============================================================
   RESIZE
   ============================================================ */
window.addEventListener('resize', () => {
    if(document.getElementById('countdown-screen').style.display !== 'none') {
        pCanvas.width  = window.innerWidth;
        pCanvas.height = window.innerHeight;
    }
    const wc = document.getElementById('warp-canvas');
    if (wc && document.getElementById('warp-screen').style.display !== 'none') {
        wc.width  = window.innerWidth;
        wc.height = window.innerHeight;
    }
    const bgc = document.getElementById('bg-stars');
    if (bgc && document.getElementById('solar-screen').style.display !== 'none') {
        bgc.width  = window.innerWidth;
        bgc.height = window.innerHeight;
    }
});
</script>
